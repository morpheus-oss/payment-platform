name: Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - qa
          - staging
          - production

permissions:
  contents: read

jobs:

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    environment:
      name: ${{ inputs.environment }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Deployment Summary
        run: |
          echo "Environment: ${{ inputs.environment }}"
          echo "Deployment pipeline initialized."
